<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

    --win:#4ade80;--loss:#f87171;--draw:#fbbf24;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--navy);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh}
  .header{background:linear-gradient(160deg,#0d2144 0%,#1a3a6b 60%,#0d2144 100%);border-bottom:2px solid var(--gold);padding:1.2rem 1.2rem 0.8rem;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:0.8rem}
  
  .team-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--gold);line-height:1}
  .team-sub{font-size:13px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
  .stats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0}
  .stat{background:#0e2444;border:1px solid rgba(255,255,255,0.12);border-radius:8px;width:90px;height:90px;flex-shrink:0;flex-grow:0;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .stat-lbl{font-size:11px;color:#c0d4e8;letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
  .stat-val{font-size:20px;font-family:'Bebas Neue',sans-serif;line-height:1.1}
  .stat-pct{font-size:11px;color:#a0bcd0;margin-top:1px}
  .tabs{display:flex;border-bottom:1px solid rgba(201,168,76,0.25);overflow-x:auto}
  .tab{padding:10px 18px;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color 0.15s}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab:hover:not(.active){color:var(--cream)}
  .panel{display:none;padding:1rem}
  .panel.active{display:block}

  /* SEASON CARDS */
  .season-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;margin-bottom:12px;overflow:hidden}
  .season-header{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 14px;cursor:pointer;background:rgba(255,255,255,0.03)}
  .season-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.08em;color:var(--gold2)}
  .season-meta{font-size:13px;color:#b8cfe0;margin-top:3px;display:flex;flex-wrap:wrap;gap:8px}
  .season-meta span{white-space:nowrap}
  .season-pills{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .pill{font-size:12px;font-weight:600;padding:3px 8px;border-radius:3px}
  .pill-w{background:var(--win-bg);color:var(--win)}
  .pill-l{background:var(--loss-bg);color:var(--loss)}
  .pill-t{background:var(--draw-bg);color:var(--draw)}
  .chevron{font-size:11px;color:var(--muted);transition:transform 0.2s;margin-top:2px}
  .season-body{display:none;padding:0 0 8px}
  .season-body.open{display:block}
  .chevron.open{transform:rotate(180deg)}

  /* BAR CHART inside season */
  .pct-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:6px 14px 10px;gap:1px}
  .pct-bar-w{background:var(--win)}
  .pct-bar-l{background:var(--loss)}
  .pct-bar-t{background:var(--draw)}

  /* COMP sub-section */
  .comp-section{margin:0 0 4px}
  .comp-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px 4px;flex-wrap:wrap;gap:4px}
  .comp-name{font-size:13px;color:var(--gold);letter-spacing:0.05em;text-transform:uppercase;font-weight:600}
  .comp-stats{font-size:12px;color:#b8cfe0;display:flex;gap:10px;flex-wrap:wrap}
  .comp-stats span{white-space:nowrap}

  /* GAMES TABLE */
  .game-table{width:100%;border-collapse:collapse;font-size:15px;table-layout:fixed}
  .game-table th{text-align:left;padding:6px 10px;font-size:12px;color:#c0d4e8;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.1)}.game-table th:nth-child(1){width:22%}.game-table th:nth-child(2){width:40%}.game-table th:nth-child(3){width:16%;text-align:center}.game-table th:nth-child(4){width:16%;text-align:center}.game-table th:nth-child(5){width:6%}
  .game-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.04);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.game-table td:nth-child(3){text-align:center}.game-table td:nth-child(4){text-align:center}
  .game-table tr:last-child td{border-bottom:none}
  .game-table tr:hover td{background:rgba(255,255,255,0.03)}
  .score{font-weight:700;color:#ffffff}
  .date-cell{color:#ffffff;white-space:nowrap;font-size:13px}
  .opp-cell{color:#ffffff}
  .loc-badge{font-size:11px;padding:2px 6px;border-radius:2px;background:rgba(255,255,255,0.12);color:#c0d4e8}
  .res-badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:3px}
  .res-W{background:var(--win-bg);color:var(--win)}
  .res-L{background:var(--loss-bg);color:var(--loss)}
  .res-T{background:var(--draw-bg);color:var(--draw)}
  .del-btn{background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:13px;padding:0 4px;transition:color 0.15s}
  .del-btn:hover{color:var(--loss)}

  /* FILTER BAR */
  .filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .filt-btn{padding:6px 14px;font-size:13px;border-radius:4px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#c0d4e8;cursor:pointer;transition:all 0.15s}
  .filt-btn.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600}
  .comp-sel{font-size:12px;padding:5px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--cream);flex:1;min-width:0;max-width:220px}
  .comp-sel option{background:var(--navy2)}
  .count-note{font-size:13px;color:#b8cfe0;margin-left:auto}

  /* ALL TABLE */
  .all-table-wrap{overflow-x:auto}
  .all-table{width:100%;border-collapse:collapse;font-size:15px;table-layout:fixed}
  .all-table th{text-align:left;padding:6px 8px;font-size:12px;color:#c0d4e8;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.35);white-space:nowrap}.all-table th:nth-child(1){width:18%}.all-table th:nth-child(2){width:30%}.all-table th:nth-child(3){width:12%;text-align:center}.all-table th:nth-child(4){width:12%;text-align:center}.all-table th:nth-child(5){width:22%}.all-table th:nth-child(6){width:6%}
  .all-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.04);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.all-table td:nth-child(3){text-align:center}.all-table td:nth-child(4){text-align:center}
  .all-table tr:hover td{background:rgba(255,255,255,0.03)}
  .comp-tag{font-size:12px;padding:2px 7px;color:#c0d4e8!important;border-radius:3px;background:rgba(255,255,255,0.08);color:#ffffff;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;display:inline-block}

  /* ADD FORM */
  .add-form{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.25);border-radius:8px;padding:1rem;margin-bottom:12px}
  .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .form-grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
  .field-lbl{font-size:13px;color:#c0d4e8;margin-bottom:3px;display:block}
  .field-inp{width:100%;padding:8px 10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:var(--cream);font-size:15px;font-family:'DM Sans',sans-serif}
  .field-inp:focus{outline:none;border-color:var(--gold)}
  .field-inp option{background:var(--navy2)}
  .save-btn{float:right;padding:7px 22px;background:var(--gold);border:none;border-radius:4px;color:var(--navy);font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
  .save-btn:hover{background:var(--gold2)}

  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .chart-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px}
  .chart-title{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold2);letter-spacing:0.06em;margin-bottom:12px}

  .empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:13px}

  .game-table td:nth-child(5){display:none}
  .all-table{font-size:12px!important}
  .all-table th:nth-child(5){display:none}
  .all-table td:nth-child(5){display:none}
  .all-table th:nth-child(6){display:none}
  .all-table td:nth-child(6){display:none}
  .res-badge{font-size:10px!important;padding:2px 5px!important}
  .date-cell{font-size:11px!important}
  .opp-cell{font-size:12px!important}
  .score{font-size:12px!important}
  .loc-badge{display:none}
  .comp-header{flex-direction:column;align-items:flex-start;gap:3px}
  .comp-stats{flex-wrap:wrap;gap:5px;font-size:11px!important}
  .season-meta{flex-direction:column;gap:2px;font-size:11px!important}
  .season-name{font-size:15px!important}
  .season-header{padding:8px 10px}
  .comp-name{font-size:11px!important}
  .game-table th{font-size:10px!important;padding:5px 6px}
  .game-table td{padding:6px 6px}
  .tab{padding:8px 12px;font-size:12px}
  .panel{padding:0.6rem}
  .form-grid2{grid-template-columns:1fr}
  .form-grid4{grid-template-columns:1fr 1fr}
  .pct-bar{margin:4px 10px 8px}
}
@media(max-width:400px){
  .stat{width:42px;height:42px}
  .stat-val{font-size:12px!important}
  .stat-lbl{font-size:7px!important}
  .stat-pct{font-size:7px!important}
  .game-table{font-size:11px!important}
  .date-cell{font-size:10px!important}
    .stats-row{grid-template-columns:repeat(5,1fr)}
    .stats-row .stat:nth-child(n+6){display:none}
    .form-grid4{grid-template-columns:1fr 1fr}
    .charts-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="team-title">Albion SC Brooklyn · B14 Premier</div>
      <div class="team-sub">Complete Game History · All Competitions</div>
    </div>
  </div>
  <div class="stats-row" id="statsRow"></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('seasons')">By Season</div>
  <div class="tab" onclick="switchTab('charts')">Charts</div>
  <div class="tab" onclick="switchTab('all')">All Games</div>
  <div class="tab" onclick="switchTab('add')">Add Game</div>
</div>
<div id="panel-seasons" class="panel active"></div>
<div id="panel-charts" class="panel">
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">W / L / D by Season</div><canvas id="chartWLD"></canvas></div>
    <div class="chart-card"><div class="chart-title">Goals For vs Against by Season</div><canvas id="chartGoals"></canvas></div>
    <div class="chart-card"><div class="chart-title">Avg Goals per Game by Season</div><canvas id="chartAvg"></canvas></div>
    <div class="chart-card"><div class="chart-title">Win % by Season</div><canvas id="chartWinPct"></canvas></div>
  </div>
</div>
<div id="panel-all" class="panel"></div>
<div id="panel-add" class="panel">
  <div class="add-form">
    <div class="form-grid2">
      <div><span class="field-lbl">Date</span><input type="date" id="fDate" class="field-inp"/></div>
      <div><span class="field-lbl">Opponent</span><input type="text" id="fOpp" class="field-inp" placeholder="Opponent name"/></div>
    </div>
    <div class="form-grid4">
      <div><span class="field-lbl">Our Goals</span><input type="number" id="fGF" class="field-inp" min="0" value="0"/></div>
      <div><span class="field-lbl">Their Goals</span><input type="number" id="fGA" class="field-inp" min="0" value="0"/></div>
      <div><span class="field-lbl">Venue</span>
        <select id="fLoc" class="field-inp"><option>Home</option><option selected>Away</option><option>Neutral</option></select>
      </div>
      <div><span class="field-lbl">Competition</span><input type="text" id="fComp" class="field-inp" placeholder="e.g. North Atlantic"/></div>
    </div>
    <button class="save-btn" onclick="addGame()">Save Result</button>
    <div style="clear:both"></div>
  </div>
</div>

const COMP_SEASON = {
  // Season 2023-24 (Sep 2023 - Jun 2024)
  'North Atlantic Fall 2023-Spring 2024':'2023-24',
  'SUSA Columbus Weekend 2023':          '2023-24',
  'EDP League Cups 2023-2024':           '2023-24',
  'SUSA Spring Kickoff 2024':            '2023-24',
  'North Atlantic Spring 2024':          '2023-24',
  // Season 2024-25 (Sep 2024 - Jun 2025)
  'EDP Summer Classic 2024':             '2024-25',
  'SUSA Columbus Cup 2024':              '2024-25',
  'North Atlantic Fall 2024':            '2024-25',
  'EDP Fall Classic 2024':               '2024-25',
  'SUSA Spring Kickoff 2025':            '2024-25',
  'North Atlantic Spring 2025':          '2024-25',
  'East Meadow SC Memorial Day 2025':    '2024-25',
  'EDP Summer Classic 2025':             '2024-25',
  // Season 2025-26 (Sep 2025 - Jun 2026)
  'SUSA Columbus Cup 2025':              '2025-26',
  'North Atlantic Fall 2025-Spring 2026':'2025-26',
  'Tri State Championship 2025-2026':    '2025-26',
  'Winter One-Day 5v5':                  '2025-26',
  'Socceroof Crown Heights':             '2025-26',
  'NYC FC 5v5 Coliseum Cup':             '2025-26',
  'North Atlantic Spring 2026':          '2025-26',
  'FC DELCO Players Cup 2026':           '2025-26',
};
const SEASON_ORDER = ['2025-26','2024-25','2023-24'];

let games=[], allFilter='All', allComp='All', seasonSort='newest';
let chartInstances = {};

function load(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)games=JSON.parse(raw);else{games=JSON.parse(JSON.stringify(SEED));save();}}
  catch(e){games=JSON.parse(JSON.stringify(SEED));}
  renderAll();
}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(games));}catch(e){}}
function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function pct(n,t){return t===0?'0%':Math.round(n/t*100)+'%';}
function avg(v,t){return t===0?'0.0':(v/t).toFixed(1);}

function calcStats(arr){
  const w=arr.filter(g=>g.r==='W').length,l=arr.filter(g=>g.r==='L').length,t=arr.filter(g=>g.r==='T').length;
  const gf=arr.reduce((s,g)=>s+g.gf,0),ga=arr.reduce((s,g)=>s+g.ga,0);
  return{total:arr.length,w,l,t,gf,ga,gd:gf-ga};
}

function renderStats(){
  const s=calcStats(games);
  document.getElementById('statsRow').innerHTML=[
    ['GP',s.total,''],
    ['W',s.w,'var(--win)',pct(s.w,s.total)],
    ['L',s.l,'var(--loss)',pct(s.l,s.total)],
    ['D',s.t,'var(--draw)',pct(s.t,s.total)],
    ['GF',s.gf,'var(--win)',avg(s.gf,s.total)+'/g'],
    ['GA',s.ga,'var(--loss)',avg(s.ga,s.total)+'/g'],
    ['GD',(s.gd>=0?'+':'')+s.gd,s.gd>=0?'var(--win)':'var(--loss)',''],
    ['Avg',avg(s.gf+s.ga,s.total),'var(--muted)','goals/g'],
  ].map(([lbl,val,col,sub])=>`<div class="stat"><div class="stat-lbl">${lbl}</div><div class="stat-val" style="color:${col||'var(--cream)'}">${val}</div>${sub?`<div class="stat-pct">${sub}</div>`:''}</div>`).join('');
}

function getSeasonData(){
  const bySeason={};
  games.forEach(g=>{
    const s=COMP_SEASON[g.comp]||'Other';
    if(!bySeason[s])bySeason[s]={};
    if(!bySeason[s][g.comp])bySeason[s][g.comp]=[];
    bySeason[s][g.comp].push(g);
  });
  return bySeason;
}

function renderSeasons(){
  const bySeason=getSeasonData();
  const order=[...SEASON_ORDER,...Object.keys(bySeason).filter(s=>!SEASON_ORDER.includes(s))];
  const sortBtn = `<div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button onclick="toggleSeasonSort()" style="padding:5px 14px;font-size:12px;border-radius:4px;border:1px solid rgba(201,168,76,0.4);background:rgba(201,168,76,0.1);color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif">
      &#8597; ${seasonSort==='newest'?'Newest First':'Oldest First'}
    </button>
  </div>`;
  let html=sortBtn;
  order.filter(s=>bySeason[s]).forEach(season=>{
    const comps=bySeason[season];
    const allG=Object.values(comps).flat();
    const s=calcStats(allG);
    const gd=(s.gd>=0?'+':'')+s.gd;
    const wp=pct(s.w,s.total),lp=pct(s.l,s.total),dp=pct(s.t,s.total);
    const avgGF=avg(s.gf,s.total),avgGA=avg(s.ga,s.total);
    const wPx=s.total?s.w/s.total*100:0,lPx=s.total?s.l/s.total*100:0,tPx=s.total?s.t/s.total*100:0;
    html+=`<div class="season-card">
      <div class="season-header" onclick="toggleSeason(this)">
        <div style="flex:1">
          <div class="season-name">${season}</div>
          <div class="season-meta">
            <span>${s.total} games</span>
            <span style="color:var(--win)">${wp} W</span>
            <span style="color:var(--loss)">${lp} L</span>
            <span style="color:var(--draw)">${dp} D</span>
            <span>Avg ${avgGF} scored / ${avgGA} conceded</span>
            <span>GD ${gd}</span>
          </div>
        </div>
        <div style="display:flex;align-items:flex-start;gap:6px;margin-left:8px">
          <div class="season-pills">
            <span class="pill pill-w">${s.w}W</span>
            <span class="pill pill-l">${s.l}L</span>
            <span class="pill pill-t">${s.t}D</span>
          </div>
          <div class="chevron">&#9660;</div>
        </div>
      </div>
      <div class="pct-bar">
        <div class="pct-bar-w" style="width:${wPx}%"></div>
        <div class="pct-bar-l" style="width:${lPx}%"></div>
        <div class="pct-bar-t" style="width:${tPx}%"></div>
      </div>
      <div class="season-body">`;

    Object.keys(comps).sort().forEach(comp=>{
      const gs=[...comps[comp]].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const cs=calcStats(gs);
      const avgF=avg(cs.gf,cs.total),avgA=avg(cs.ga,cs.total);
      html+=`<div class="comp-section">
        <div class="comp-header">
          <div class="comp-name">${comp}</div>
          <div class="comp-stats">
            <span style="color:var(--win)">${cs.w}W (${pct(cs.w,cs.total)})</span>
            <span style="color:var(--loss)">${cs.l}L (${pct(cs.l,cs.total)})</span>
            <span style="color:var(--draw)">${cs.t}D (${pct(cs.t,cs.total)})</span>
            <span>&#8709; ${avgF} / ${avgA}</span>
          </div>
        </div>
        <table class="game-table">
          <thead><tr><th>Date</th><th>Opponent</th><th>Score</th><th>Result</th><th></th></tr></thead>
          <tbody>${gs.map(g=>`<tr>
            <td class="date-cell">${fmt(g.date)}</td>
            <td class="opp-cell">${g.opp} <span class="loc-badge">${g.loc[0]}</span></td>
            <td class="score">${g.gf} &ndash; ${g.ga}</td>
            <td><span class="res-badge res-${g.r}">${g.r==='W'?'Win':g.r==='L'?'Loss':'Draw'}</span></td>
            <td><button class="del-btn" onclick="delGame(${g.id})">&#10005;</button></td>
          </tr>`).join('')}</tbody>
        </table></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('panel-seasons').innerHTML=html||'<div class="empty">No games yet.</div>';
}

function renderCharts(){
  const bySeason=getSeasonData();
  const baseOrder = seasonSort==='newest'
    ? [...SEASON_ORDER,...Object.keys(bySeason).filter(s=>!SEASON_ORDER.includes(s))]
    : [...SEASON_ORDER,...Object.keys(bySeason).filter(s=>!SEASON_ORDER.includes(s))].reverse();
  const order = baseOrder.filter(s=>bySeason[s]);
  const labels=order;
  const wins=[],losses=[],draws=[],gfArr=[],gaArr=[],avgFor=[],avgAgainst=[],winPcts=[];
  order.forEach(s=>{
    const g=Object.values(bySeason[s]).flat();
    const st=calcStats(g);
    wins.push(st.w);losses.push(st.l);draws.push(st.t);
    gfArr.push(st.gf);gaArr.push(st.ga);
    avgFor.push(parseFloat(avg(st.gf,st.total)));
    avgAgainst.push(parseFloat(avg(st.ga,st.total)));
    winPcts.push(st.total?Math.round(st.w/st.total*100):0);
  });

  const defaults={responsive:true,plugins:{legend:{labels:{color:'#7a9abf',font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}`}}},scales:{x:{ticks:{color:'#7a9abf',font:{size:10},maxRotation:45},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#7a9abf',font:{size:10}},grid:{color:'rgba(255,255,255,0.06)'}}}};

  function mkChart(id,cfg){
    if(chartInstances[id])chartInstances[id].destroy();
    chartInstances[id]=new Chart(document.getElementById(id),cfg);
  }

  mkChart('chartWLD',{type:'bar',data:{labels,datasets:[
    {label:'Wins',data:wins,backgroundColor:'rgba(74,222,128,0.7)',borderRadius:3},
    {label:'Losses',data:losses,backgroundColor:'rgba(248,113,113,0.7)',borderRadius:3},
    {label:'Draws',data:draws,backgroundColor:'rgba(251,191,36,0.7)',borderRadius:3},
  ]},options:{...defaults,plugins:{...defaults.plugins,title:{display:false}},scales:{...defaults.scales,x:{...defaults.scales.x,stacked:false},y:{...defaults.scales.y,stacked:false}}}});

  mkChart('chartGoals',{type:'bar',data:{labels,datasets:[
    {label:'Goals For',data:gfArr,backgroundColor:'rgba(74,222,128,0.6)',borderRadius:3},
    {label:'Goals Against',data:gaArr,backgroundColor:'rgba(248,113,113,0.6)',borderRadius:3},
  ]},options:defaults});

  mkChart('chartAvg',{type:'line',data:{labels,datasets:[
    {label:'Avg Scored',data:avgFor,borderColor:'rgba(74,222,128,0.9)',backgroundColor:'rgba(74,222,128,0.1)',tension:0.3,fill:true,pointBackgroundColor:'rgba(74,222,128,1)',pointRadius:4},
    {label:'Avg Conceded',data:avgAgainst,borderColor:'rgba(248,113,113,0.9)',backgroundColor:'rgba(248,113,113,0.1)',tension:0.3,fill:true,pointBackgroundColor:'rgba(248,113,113,1)',pointRadius:4},
  ]},options:defaults});

  mkChart('chartWinPct',{type:'line',data:{labels,datasets:[
    {label:'Win %',data:winPcts,borderColor:'rgba(201,168,76,0.9)',backgroundColor:'rgba(201,168,76,0.15)',tension:0.3,fill:true,pointBackgroundColor:'rgba(201,168,76,1)',pointRadius:4},
  ]},options:{...defaults,plugins:{...defaults.plugins},scales:{...defaults.scales,y:{...defaults.scales.y,min:0,max:100,ticks:{...defaults.scales.y.ticks,callback:v=>v+'%'}}}}});
}

function renderAllGames(){
  const comps=['All',...new Set(games.map(g=>g.comp))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
  const vis=[...games].filter(g=>(allFilter==='All'||g.r===allFilter)&&(allComp==='All'||g.comp===allComp)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const fb=`<div class="filter-bar">
    ${['All','W','L','T'].map(f=>`<button class="filt-btn ${allFilter===f?'on':''}" onclick="setAllFilter('${f}')">${f==='All'?'All':f==='W'?'Wins':f==='L'?'Losses':'Draws'}</button>`).join('')}
    <select class="comp-sel" onchange="setAllComp(this.value)">${comps.map(c=>`<option value="${c}" ${allComp===c?'selected':''}>${c==='All'?'All competitions':c}</option>`).join('')}</select>
    <span class="count-note">${vis.length} games</span>
  </div>`;
  const tbl=vis.length===0?'<div class="empty">No games match.</div>':`<div class="all-table-wrap"><table class="all-table">
    <thead><tr><th>Date</th><th>Opponent</th><th>Score</th><th>Result</th><th>Competition</th><th></th></tr></thead>
    <tbody>${vis.map(g=>`<tr>
      <td class="date-cell">${fmt(g.date)}</td>
      <td class="opp-cell">${g.opp} <span class="loc-badge">${g.loc[0]}</span></td>
      <td class="score">${g.gf} &ndash; ${g.ga}</td>
      <td><span class="res-badge res-${g.r}">${g.r==='W'?'Win':g.r==='L'?'Loss':'Draw'}</span></td>
      <td><span class="comp-tag" title="${g.comp}">${g.comp}</span></td>
      <td><button class="del-btn" onclick="delGame(${g.id})">&#10005;</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
  document.getElementById('panel-all').innerHTML=fb+tbl;
}

function renderAll(){renderStats();renderSeasons();renderAllGames();}
function setAllFilter(f){allFilter=f;renderAllGames();}
function setAllComp(c){allComp=c;renderAllGames();}
function toggleSeason(h){const b=h.nextElementSibling.nextElementSibling;const c=h.querySelector('.chevron');b.classList.toggle('open');c.classList.toggle('open');}
function delGame(id){if(!confirm('Delete this game?'))return;games=games.filter(g=>g.id!==id);save();renderAll();}
function addGame(){
  const date=document.getElementById('fDate').value;
  const opp=document.getElementById('fOpp').value.trim();
  const gf=parseInt(document.getElementById('fGF').value)||0;
  const ga=parseInt(document.getElementById('fGA').value)||0;
  const loc=document.getElementById('fLoc').value;
  const comp=document.getElementById('fComp').value.trim()||'Other';
  if(!date||!opp){alert('Please enter a date and opponent.');return;}
  const r=gf>ga?'W':gf<ga?'L':'T';
  games.push({id:Date.now(),date,opp,gf,ga,r,loc,comp});
  save();renderAll();
  document.getElementById('fDate').value='';
  document.getElementById('fOpp').value='';
  document.getElementById('fGF').value='0';
  document.getElementById('fGA').value='0';
  document.getElementById('fComp').value='';
  switchTab('seasons');
  alert('Game saved!');
}
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['seasons','charts','all','add'][i]===name);});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='all')renderAllGames();
  if(name==='charts')renderCharts();
}
function toggleSeasonSort(){seasonSort=seasonSort==='newest'?'oldest':'newest';renderSeasons();}
load();
