<style>

    --navy2: #122647;
    --navy3: #1a3260;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --cream: #e8e0d0;
    --muted: #7a9abf;
    --win: #4ade80;
    --loss: #f87171;
    --draw: #fbbf24;
    --win-bg: rgba(74,222,128,0.12);
    --loss-bg: rgba(248,113,113,0.12);
    --draw-bg: rgba(251,191,36,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--cream); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .header { background: linear-gradient(160deg, #0d2144 0%, #1a3a6b 60%, #0d2144 100%); border-bottom: 2px solid var(--gold); padding: 1.5rem 1.5rem 1rem; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 1rem; }
  .crest { width: 48px; height: 48px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .team-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.08em; color: var(--gold); line-height: 1; }
  .team-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
  .stats-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .stat { background: rgba(255,255,255,0.07); border-radius: 6px; padding: 6px 4px; text-align: center; }
  .stat-lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .stat-val { font-size: 20px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; line-height: 1.1; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(201,168,76,0.25); overflow-x: auto; }
  .tab { padding: 10px 18px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab:hover:not(.active) { color: var(--cream); }
  .panel { display: none; padding: 1rem; }
  .panel.active { display: block; }
  .season-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .season-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; background: rgba(255,255,255,0.03); }
  .season-name { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.08em; color: var(--gold2); }
  .season-rec { font-size: 12px; color: var(--muted); }
  .season-pills { display: flex; gap: 5px; align-items: center; }
  .pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; }
  .pill-w { background: var(--win-bg); color: var(--win); }
  .pill-l { background: var(--loss-bg); color: var(--loss); }
  .pill-t { background: var(--draw-bg); color: var(--draw); }
  .chevron { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
  .season-body { display: none; padding: 0 0 8px; }
  .season-body.open { display: block; }
  .chevron.open { transform: rotate(180deg); }
  .game-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .game-table th { text-align: left; padding: 6px 10px; font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .game-table td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .game-table tr:last-child td { border-bottom: none; }
  .game-table tr:hover td { background: rgba(255,255,255,0.03); }
  .score { font-weight: 600; color: var(--cream); }
  .date-cell { color: var(--muted); white-space: nowrap; font-size: 11px; }
  .opp-cell { color: var(--cream); }
  .loc-badge { font-size: 9px; padding: 1px 5px; border-radius: 2px; background: rgba(255,255,255,0.08); color: var(--muted); }
  .res-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; }
  .res-W { background: var(--win-bg); color: var(--win); }
  .res-L { background: var(--loss-bg); color: var(--loss); }
  .res-T { background: var(--draw-bg); color: var(--draw); }
  .filter-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .filt-btn { padding: 5px 13px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filt-btn.on { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: 600; }
  .filt-btn:hover:not(.on) { color: var(--cream); }
  .comp-sel { font-size: 12px; padding: 5px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: var(--cream); flex: 1; min-width: 0; max-width: 220px; }
  .comp-sel option { background: var(--navy2); }
  .count-note { font-size: 11px; color: var(--muted); margin-left: auto; }
  .add-form { background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; padding: 1rem; margin-bottom: 12px; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .field-lbl { font-size: 11px; color: var(--muted); margin-bottom: 3px; display: block; }
  .field-inp { width: 100%; padding: 7px 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; color: var(--cream); font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .field-inp:focus { outline: none; border-color: var(--gold); }
  .field-inp option { background: var(--navy2); }
  .save-btn { float: right; padding: 7px 22px; background: var(--gold); border: none; border-radius: 4px; color: var(--navy); font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .save-btn:hover { background: var(--gold2); }
  .del-btn { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.15s; }
  .del-btn:hover { color: var(--loss); }
  .all-table-wrap { overflow-x: auto; }
  .all-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .all-table th { text-align: left; padding: 6px 8px; font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid rgba(201,168,76,0.25); white-space: nowrap; }
  .all-table td { padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .all-table tr:hover td { background: rgba(255,255,255,0.03); }
  .comp-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(255,255,255,0.08); color: var(--muted); white-space: nowrap; max-width: 150px; overflow: hidden; text-overflow: ellipsis; display: inline-block; }
  .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 13px; }
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(4, 1fr); }
    .stats-row .stat:nth-child(n+5) { display: none; }
    .form-grid4 { grid-template-columns: 1fr 1fr; }
    .team-title { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="crest">⚽</div>
    <div>
      <div class="team-title">Albion SC Brooklyn · B14 Premier</div>
      <div class="team-sub">Complete Game History · All Competitions</div>
    </div>
  </div>
  <div class="stats-row" id="statsRow"></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('seasons')">By Season</div>
  <div class="tab" onclick="switchTab('all')">All Games</div>
  <div class="tab" onclick="switchTab('add')">Add Game</div>
</div>
<div id="panel-seasons" class="panel active"></div>
<div id="panel-all" class="panel"></div>
<div id="panel-add" class="panel">
  <div class="add-form">
    <div class="form-grid2">
      <div><span class="field-lbl">Date</span><input type="date" id="fDate" class="field-inp"/></div>
      <div><span class="field-lbl">Opponent</span><input type="text" id="fOpp" class="field-inp" placeholder="Opponent name"/></div>
    </div>
    <div class="form-grid4">
      <div><span class="field-lbl">Our Goals</span><input type="number" id="fGF" class="field-inp" min="0" value="0"/></div>
      <div><span class="field-lbl">Their Goals</span><input type="number" id="fGA" class="field-inp" min="0" value="0"/></div>
      <div><span class="field-lbl">Venue</span>
        <select id="fLoc" class="field-inp">
          <option>Home</option><option selected>Away</option><option>Neutral</option>
        </select>
      </div>
      <div><span class="field-lbl">Competition</span><input type="text" id="fComp" class="field-inp" placeholder="e.g. North Atlantic"/></div>
    </div>
    <button class="save-btn" onclick="addGame()">Save Result</button>
    <div style="clear:both"></div>
  </div>
</div>

const COMP_SEASON = {
  'North Atlantic Fall 2023-Spring 2024': '2023 Fall',
  'SUSA Columbus Weekend 2023':           '2023 Fall',
  'EDP League Cups 2023-2024':            '2023-24',
  'SUSA Spring Kickoff 2024':             '2024 Spring',
  'North Atlantic Spring 2024':           '2024 Spring',
  'EDP Summer Classic 2024':              '2024 Summer',
  'SUSA Columbus Cup 2024':               '2024 Fall',
  'North Atlantic Fall 2024':             '2024 Fall',
  'EDP Fall Classic 2024':                '2024 Fall',
  'SUSA Spring Kickoff 2025':             '2025 Spring',
  'North Atlantic Spring 2025':           '2025 Spring',
  'East Meadow SC Memorial Day 2025':     '2025 Spring',
  'EDP Summer Classic 2025':              '2025 Summer',
  'SUSA Columbus Cup 2025':               '2025 Fall',
  'North Atlantic Fall 2025-Spring 2026': '2025-26',
  'Tri State Championship 2025-2026':     '2025-26',
  'Winter One-Day 5v5':                   '2025-26',
  'Socceroof Crown Heights':              '2025-26',
  'NYC FC 5v5 Coliseum Cup':              '2025-26',
  'North Atlantic Spring 2026':           '2025-26',
  'FC DELCO Players Cup 2026':            '2025-26',
};
const SEASON_ORDER = ['2023 Fall','2023-24','2024 Spring','2024 Summer','2024 Fall','2025 Spring','2025 Summer','2025 Fall','2025-26'];
let games = [], allFilter = 'All', allComp = 'All';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { games = JSON.parse(raw); }
    else { games = JSON.parse(JSON.stringify(SEED)); save(); }
  } catch(e) { games = JSON.parse(JSON.stringify(SEED)); }
  renderAll();
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(games)); } catch(e) {} }
function fmt(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function calcStats(arr) {
  const w=arr.filter(g=>g.r==='W').length, l=arr.filter(g=>g.r==='L').length, t=arr.filter(g=>g.r==='T').length;
  const gf=arr.reduce((s,g)=>s+g.gf,0), ga=arr.reduce((s,g)=>s+g.ga,0);
  return {total:arr.length, w, l, t, gf, ga, gd:gf-ga};
}
function renderStats() {
  const s = calcStats(games);
  document.getElementById('statsRow').innerHTML = [
    ['GP',s.total,''],['W',s.w,'var(--win)'],['L',s.l,'var(--loss)'],['D',s.t,'var(--draw)'],
    ['GF',s.gf,'var(--win)'],['GA',s.ga,'var(--loss)'],['GD',(s.gd>=0?'+':'')+s.gd,s.gd>=0?'var(--win)':'var(--loss)'],
  ].map(([lbl,val,col])=>`<div class="stat"><div class="stat-lbl">${lbl}</div><div class="stat-val" style="color:${col||'var(--cream)'}">${val}</div></div>`).join('');
}
function renderSeasons() {
  const bySeason = {};
  games.forEach(g => {
    const s = COMP_SEASON[g.comp] || 'Other';
    if (!bySeason[s]) bySeason[s] = {};
    if (!bySeason[s][g.comp]) bySeason[s][g.comp] = [];
    bySeason[s][g.comp].push(g);
  });
  const order = [...SEASON_ORDER, ...Object.keys(bySeason).filter(s=>!SEASON_ORDER.includes(s))];
  let html = '';
  order.filter(s=>bySeason[s]).forEach(season => {
    const comps = bySeason[season];
    const allG = Object.values(comps).flat();
    const s = calcStats(allG);
    const gd = (s.gd>=0?'+':'')+s.gd;
    html += `<div class="season-card">
      <div class="season-header" onclick="toggleSeason(this)">
        <div>
          <div class="season-name">${season}</div>
          <div class="season-rec" style="margin-top:2px">${s.total} games &middot; ${s.gf}&ndash;${s.ga} goals (${gd})</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="season-pills">
            <span class="pill pill-w">${s.w}W</span>
            <span class="pill pill-l">${s.l}L</span>
            <span class="pill pill-t">${s.t}D</span>
          </div>
          <div class="chevron">&#9660;</div>
        </div>
      </div>
      <div class="season-body">`;
    Object.keys(comps).sort().forEach(comp => {
      const gs = [...comps[comp]].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const cs = calcStats(gs);
      html += `<div>
        <div style="padding:8px 14px 4px;font-size:11px;color:var(--gold);letter-spacing:0.06em;text-transform:uppercase;font-weight:600">${comp} <span style="color:var(--muted);font-weight:400">(${cs.w}W ${cs.l}L ${cs.t}D)</span></div>
        <table class="game-table">
          <thead><tr><th>Date</th><th>Opponent</th><th>Score</th><th>Result</th><th></th></tr></thead>
          <tbody>${gs.map(g=>`<tr>
            <td class="date-cell">${fmt(g.date)}</td>
            <td class="opp-cell">${g.opp} <span class="loc-badge">${g.loc[0]}</span></td>
            <td class="score">${g.gf} &ndash; ${g.ga}</td>
            <td><span class="res-badge res-${g.r}">${g.r==='W'?'Win':g.r==='L'?'Loss':'Draw'}</span></td>
            <td><button class="del-btn" onclick="delGame(${g.id})" title="Delete">&#10005;</button></td>
          </tr>`).join('')}</tbody>
        </table></div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('panel-seasons').innerHTML = html || '<div class="empty">No games yet.</div>';
}
function renderAllGames() {
  const comps = ['All',...new Set(games.map(g=>g.comp))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
  const vis = [...games].filter(g=>(allFilter==='All'||g.r===allFilter)&&(allComp==='All'||g.comp===allComp)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filterBar = `<div class="filter-bar">
    ${['All','W','L','T'].map(f=>`<button class="filt-btn ${allFilter===f?'on':''}" onclick="setAllFilter('${f}')">${f==='All'?'All':f==='W'?'Wins':f==='L'?'Losses':'Draws'}</button>`).join('')}
    <select class="comp-sel" onchange="setAllComp(this.value)">${comps.map(c=>`<option value="${c}" ${allComp===c?'selected':''}>${c==='All'?'All competitions':c}</option>`).join('')}</select>
    <span class="count-note">${vis.length} games</span>
  </div>`;
  const table = vis.length===0 ? '<div class="empty">No games match.</div>' :
    `<div class="all-table-wrap"><table class="all-table">
      <thead><tr><th>Date</th><th>Opponent</th><th>Score</th><th>Result</th><th>Competition</th><th></th></tr></thead>
      <tbody>${vis.map(g=>`<tr>
        <td class="date-cell">${fmt(g.date)}</td>
        <td class="opp-cell">${g.opp} <span class="loc-badge">${g.loc[0]}</span></td>
        <td class="score">${g.gf} &ndash; ${g.ga}</td>
        <td><span class="res-badge res-${g.r}">${g.r==='W'?'Win':g.r==='L'?'Loss':'Draw'}</span></td>
        <td><span class="comp-tag" title="${g.comp}">${g.comp}</span></td>
        <td><button class="del-btn" onclick="delGame(${g.id})" title="Delete">&#10005;</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  document.getElementById('panel-all').innerHTML = filterBar + table;
}
function renderAll() { renderStats(); renderSeasons(); renderAllGames(); }
function setAllFilter(f) { allFilter=f; renderAllGames(); }
function setAllComp(c) { allComp=c; renderAllGames(); }
function toggleSeason(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}
function delGame(id) {
  if (!confirm('Delete this game?')) return;
  games = games.filter(g=>g.id!==id);
  save(); renderAll();
}
function addGame() {
  const date=document.getElementById('fDate').value;
  const opp=document.getElementById('fOpp').value.trim();
  const gf=parseInt(document.getElementById('fGF').value)||0;
  const ga=parseInt(document.getElementById('fGA').value)||0;
  const loc=document.getElementById('fLoc').value;
  const comp=document.getElementById('fComp').value.trim()||'Other';
  if (!date||!opp) { alert('Please enter a date and opponent.'); return; }
  const r=gf>ga?'W':gf<ga?'L':'T';
  games.push({id:Date.now(),date,opp,gf,ga,r,loc,comp});
  save(); renderAll();
  document.getElementById('fDate').value='';
  document.getElementById('fOpp').value='';
  document.getElementById('fGF').value='0';
  document.getElementById('fGA').value='0';
  document.getElementById('fComp').value='';
  switchTab('seasons');
  alert('Game saved!');
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['seasons','all','add'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if (name==='all') renderAllGames();
}
load();
</script>
